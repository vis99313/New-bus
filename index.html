<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚌 Bus Tracker - Student Bus System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea, select {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        body {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }
        @media (max-width: 1024px) {
            body {
                font-size: 14px;
            }
            input, select, textarea, button {
                font-size: 16px !important;
            }
        }
        .tablet-grid {
            display: grid;
            gap: 1rem;
        }
        @media (min-width: 768px) {
            .tablet-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .tablet-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .touch-friendly-btn {
            padding: 12px 16px;
            min-height: 44px;
            min-width: 44px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        export default function StudentBusTripSystem() {
            const [currentPage, setCurrentPage] = useState("login");
            const [adminTab, setAdminTab] = useState("records");
            const [isLoggedIn, setIsLoggedIn] = useState(false);

            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");

            const [studentName, setStudentName] = useState("");
            const [vehicleName, setVehicleName] = useState("");
            const [tripName, setTripName] = useState("");
            const [studentClass, setStudentClass] = useState("");
            const [section, setSection] = useState("");
            const [whatsappNumber, setWhatsappNumber] = useState("");

            const [searchName, setSearchName] = useState("");
            const [filterVehicle, setFilterVehicle] = useState("");
            const [filterClass, setFilterClass] = useState("");
            const [filterSection, setFilterSection] = useState("");
            const [filterTrip, setFilterTrip] = useState("");

            const [records, setRecords] = useState([]);
            const [vehicles, setVehicles] = useState(["Ramesh Kumar"]);
            const [trips, setTrips] = useState(["Morning Route"]);
            const [classes, setClasses] = useState(["Class 1"]);
            const [sections, setSections] = useState(["A"]);

            const [newVehicle, setNewVehicle] = useState("");
            const [newTrip, setNewTrip] = useState("");
            const [newClass, setNewClass] = useState("");
            const [newSection, setNewSection] = useState("");

            useEffect(() => {
                const savedRecords = localStorage.getItem("busRecords");
                const savedVehicles = localStorage.getItem("busVehicles");
                const savedTrips = localStorage.getItem("busTrips");
                const savedClasses = localStorage.getItem("busClasses");
                const savedSections = localStorage.getItem("busSections");

                if (savedRecords) setRecords(JSON.parse(savedRecords));
                if (savedVehicles) setVehicles(JSON.parse(savedVehicles));
                if (savedTrips) setTrips(JSON.parse(savedTrips));
                if (savedClasses) setClasses(JSON.parse(savedClasses));
                if (savedSections) setSections(JSON.parse(savedSections));
            }, []);

            useEffect(() => {
                localStorage.setItem("busRecords", JSON.stringify(records));
            }, [records]);

            useEffect(() => {
                localStorage.setItem("busVehicles", JSON.stringify(vehicles));
            }, [vehicles]);

            useEffect(() => {
                localStorage.setItem("busTrips", JSON.stringify(trips));
            }, [trips]);

            useEffect(() => {
                localStorage.setItem("busClasses", JSON.stringify(classes));
            }, [classes]);

            useEffect(() => {
                localStorage.setItem("busSections", JSON.stringify(sections));
            }, [sections]);

            const validatePhoneNumber = (phone) => {
                const cleaned = phone.replace(/\D/g, "");
                return cleaned.length >= 10 && cleaned.length <= 12;
            };

            const formatPhoneForWhatsApp = (phone) => {
                let cleaned = phone.replace(/\D/g, "");
                if (cleaned.length === 10) {
                    cleaned = "91" + cleaned;
                }
                return cleaned;
            };

            const handleLogin = () => {
                if (!username || !password) {
                    alert("Please enter username and password");
                    return;
                }
                if (username === "admin" && password === "admin123") {
                    setIsLoggedIn(true);
                    setCurrentPage("admin");
                    setUsername("");
                    setPassword("");
                } else {
                    alert("Invalid credentials. Try admin/admin123");
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentPage("login");
                setUsername("");
                setPassword("");
            };

            const addRecord = () => {
                if (
                    !studentName.trim() ||
                    !vehicleName ||
                    !tripName ||
                    !studentClass ||
                    !section ||
                    !whatsappNumber.trim()
                ) {
                    alert("Please fill all fields");
                    return;
                }

                if (!validatePhoneNumber(whatsappNumber)) {
                    alert("Please enter a valid phone number (10-12 digits)");
                    return;
                }

                const newRecord = {
                    id: Date.now(),
                    studentName: studentName.trim(),
                    vehicleName,
                    tripName,
                    studentClass,
                    section,
                    whatsappNumber: whatsappNumber.trim(),
                    createdAt: new Date().toISOString(),
                };

                setRecords([newRecord, ...records]);
                resetForm();
            };

            const resetForm = () => {
                setStudentName("");
                setVehicleName("");
                setTripName("");
                setStudentClass("");
                setSection("");
                setWhatsappNumber("");
            };

            const deleteRecord = (id) => {
                if (window.confirm("Are you sure you want to delete this record?")) {
                    setRecords(records.filter((record) => record.id !== id));
                }
            };

            const sendWhatsappMessage = (record) => {
                const phone = formatPhoneForWhatsApp(record.whatsappNumber);
                const message = `Hello Parent, the bus timing/trip for ${record.studentName} has been changed.`;
                const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
                window.open(url, "_blank");
            };

            const filteredRecords = (records || []).filter((record) => {
                return (
                    (record.studentName || "")
                        .toLowerCase()
                        .includes(searchName.toLowerCase()) &&
                    (filterVehicle === "" || record.vehicleName === filterVehicle) &&
                    (filterClass === "" || record.studentClass === filterClass) &&
                    (filterSection === "" || record.section === filterSection) &&
                    (filterTrip === "" || record.tripName === filterTrip)
                );
            });

            const addItem = (newItem, setter, list) => {
                if (!newItem.trim()) {
                    alert("Please enter a value");
                    return;
                }
                if (list.includes(newItem.trim())) {
                    alert("This item already exists");
                    return;
                }
                setter([...list, newItem.trim()]);
            };

            const removeItem = (index, list, setter) => {
                setter(list.filter((_, i) => i !== index));
            };

            if (currentPage === "login") {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md">
                            <div className="text-center mb-6">
                                <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                                    🚌 Bus Tracker
                                </h1>
                                <p className="text-gray-600">Admin Login</p>
                            </div>

                            <input
                                type="text"
                                placeholder="Username"
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                onKeyPress={(e) => e.key === "Enter" && handleLogin()}
                                className="w-full border border-gray-300 rounded-xl p-4 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                onKeyPress={(e) => e.key === "Enter" && handleLogin()}
                                className="w-full border border-gray-300 rounded-xl p-4 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                            <button
                                onClick={handleLogin}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition touch-friendly-btn"
                            >
                                Login
                            </button>
                            <p className="text-center text-xs md:text-sm text-gray-500 mt-4">
                                Demo: admin / admin123
                            </p>
                        </div>
                    </div>
                );
            }

            if (currentPage === "admin") {
                return (
                    <div className="min-h-screen bg-gray-100 p-3 md:p-6">
                        <div className="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl p-3 md:p-6">
                            {/* Header */}
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 pb-4 border-b gap-3">
                                <div className="flex items-center gap-3">
                                    <span className="text-3xl md:text-4xl">🚌</span>
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-bold text-gray-800">
                                            Admin Dashboard
                                        </h1>
                                        <p className="text-gray-600 text-xs md:text-sm">
                                            Manage bus trips and student records
                                        </p>
                                    </div>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition touch-friendly-btn w-full md:w-auto"
                                >
                                    Logout
                                </button>
                            </div>

                            {/* Tab Navigation */}
                            <div className="flex gap-2 mb-6">
                                <button
                                    onClick={() => setAdminTab("records")}
                                    className={`px-4 md:px-6 py-2 md:py-3 rounded-lg font-semibold transition touch-friendly-btn flex-1 md:flex-none text-sm md:text-base ${
                                        adminTab === "records"
                                            ? "bg-blue-600 text-white"
                                            : "bg-gray-200 text-gray-800 hover:bg-gray-300"
                                    }`}
                                >
                                    📋 Records
                                </button>
                                <button
                                    onClick={() => setAdminTab("settings")}
                                    className={`px-4 md:px-6 py-2 md:py-3 rounded-lg font-semibold transition touch-friendly-btn flex-1 md:flex-none text-sm md:text-base ${
                                        adminTab === "settings"
                                            ? "bg-blue-600 text-white"
                                            : "bg-gray-200 text-gray-800 hover:bg-gray-300"
                                    }`}
                                >
                                    ⚙️ Settings
                                </button>
                            </div>

                            {/* RECORDS TAB */}
                            {adminTab === "records" && (
                                <div>
                                    {/* Add Record Form */}
                                    <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 md:p-6 mb-6">
                                        <h2 className="text-lg md:text-xl font-bold mb-4">Add New Student</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-4">
                                            <input
                                                type="text"
                                                placeholder="Student Name"
                                                value={studentName}
                                                onChange={(e) => setStudentName(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                                            />
                                            <select
                                                value={vehicleName}
                                                onChange={(e) => setVehicleName(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                                            >
                                                <option value="">Select Vehicle</option>
                                                {vehicles.map((vehicle, idx) => (
                                                    <option key={idx} value={vehicle}>
                                                        {vehicle}
                                                    </option>
                                                ))}
                                            </select>
                                            <select
                                                value={studentClass}
                                                onChange={(e) => setStudentClass(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                                            >
                                                <option value="">Select Class</option>
                                                {classes.map((cls, idx) => (
                                                    <option key={idx} value={cls}>
                                                        {cls}
                                                    </option>
                                                ))}
                                            </select>
                                            <select
                                                value={section}
                                                onChange={(e) => setSection(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                                            >
                                                <option value="">Select Section</option>
                                                {sections.map((sec, idx) => (
                                                    <option key={idx} value={sec}>
                                                        {sec}
                                                    </option>
                                                ))}
                                            </select>
                                            <select
                                                value={tripName}
                                                onChange={(e) => setTripName(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                                            >
                                                <option value="">Select Trip</option>
                                                {trips.map((trip, idx) => (
                                                    <option key={idx} value={trip}>
                                                        {trip}
                                                    </option>
                                                ))}
                                            </select>
                                            <input
                                                type="tel"
                                                placeholder="WhatsApp Number"
                                                value={whatsappNumber}
                                                onChange={(e) => setWhatsappNumber(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                                            />
                                        </div>
                                        <button
                                            onClick={addRecord}
                                            className="w-full bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-semibold transition touch-friendly-btn text-sm md:text-base"
                                        >
                                            ✅ Add Student Record
                                        </button>
                                    </div>

                                    {/* Filters */}
                                    <details className="bg-white border border-gray-300 rounded-lg p-4 mb-6">
                                        <summary className="cursor-pointer font-bold text-base md:text-lg">
                                            🔍 Filters & Search
                                        </summary>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 mt-4">
                                            <input
                                                type="text"
                                                placeholder="Search Student Name"
                                                value={searchName}
                                                onChange={(e) => setSearchName(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 text-sm md:text-base"
                                            />
                                            <select
                                                value={filterVehicle}
                                                onChange={(e) => setFilterVehicle(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 text-sm md:text-base"
                                            >
                                                <option value="">All Vehicles</option>
                                                {vehicles.map((vehicle, idx) => (
                                                    <option key={idx} value={vehicle}>
                                                        {vehicle}
                                                    </option>
                                                ))}
                                            </select>
                                            <select
                                                value={filterClass}
                                                onChange={(e) => setFilterClass(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 text-sm md:text-base"
                                            >
                                                <option value="">All Classes</option>
                                                {classes.map((cls, idx) => (
                                                    <option key={idx} value={cls}>
                                                        {cls}
                                                    </option>
                                                ))}
                                            </select>
                                            <select
                                                value={filterSection}
                                                onChange={(e) => setFilterSection(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 text-sm md:text-base"
                                            >
                                                <option value="">All Sections</option>
                                                {sections.map((sec, idx) => (
                                                    <option key={idx} value={sec}>
                                                        {sec}
                                                    </option>
                                                ))}
                                            </select>
                                            <select
                                                value={filterTrip}
                                                onChange={(e) => setFilterTrip(e.target.value)}
                                                className="border border-gray-300 rounded-lg p-3 text-sm md:text-base"
                                            >
                                                <option value="">All Trips</option>
                                                {trips.map((trip, idx) => (
                                                    <option key={idx} value={trip}>
                                                        {trip}
                                                    </option>
                                                ))}
                                            </select>
                                        </div>
                                    </details>

                                    {/* Records Table */}
                                    {filteredRecords.length === 0 ? (
                                        <div className="text-center py-12">
                                            <p className="text-gray-500 text-base md:text-lg">
                                                No student records found
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full border-collapse text-sm md:text-base">
                                                <thead className="bg-gray-800 text-white sticky top-0">
                                                    <tr>
                                                        <th className="border p-2 md:p-3 text-left">Student Name</th>
                                                        <th className="border p-2 md:p-3 text-left">Vehicle</th>
                                                        <th className="border p-2 md:p-3 text-left">Class</th>
                                                        <th className="border p-2 md:p-3 text-left">Section</th>
                                                        <th className="border p-2 md:p-3 text-left">Trip</th>
                                                        <th className="border p-2 md:p-3 text-left">WhatsApp</th>
                                                        <th className="border p-2 md:p-3 text-center">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {filteredRecords.map((record) => (
                                                        <tr key={record.id} className="hover:bg-gray-50">
                                                            <td className="border p-2 md:p-3">{record.studentName}</td>
                                                            <td className="border p-2 md:p-3">{record.vehicleName}</td>
                                                            <td className="border p-2 md:p-3">{record.studentClass}</td>
                                                            <td className="border p-2 md:p-3">{record.section}</td>
                                                            <td className="border p-2 md:p-3">{record.tripName}</td>
                                                            <td className="border p-2 md:p-3">{record.whatsappNumber}</td>
                                                            <td className="border p-2 md:p-3 text-center space-x-1 md:space-x-2">
                                                                <button
                                                                    onClick={() => sendWhatsappMessage(record)}
                                                                    className="bg-green-500 hover:bg-green-600 text-white px-2 md:px-3 py-1 rounded text-xs md:text-sm touch-friendly-btn"
                                                                >
                                                                    💬
                                                                </button>
                                                                <button
                                                                    onClick={() => deleteRecord(record.id)}
                                                                    className="bg-red-500 hover:bg-red-600 text-white px-2 md:px-3 py-1 rounded text-xs md:text-sm touch-friendly-btn"
                                                                >
                                                                    🗑️
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* SETTINGS TAB */}
                            {adminTab === "settings" && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                                    <SettingsCard
                                        title="🚌 Vehicles"
                                        items={vehicles}
                                        newItem={newVehicle}
                                        setNewItem={setNewVehicle}
                                        onAdd={() => addItem(newVehicle, setNewVehicle, vehicles)}
                                        onRemove={(idx) => removeItem(idx, vehicles, setVehicles)}
                                    />
                                    <SettingsCard
                                        title="🛣️ Trips"
                                        items={trips}
                                        newItem={newTrip}
                                        setNewItem={setNewTrip}
                                        onAdd={() => addItem(newTrip, setNewTrip, trips)}
                                        onRemove={(idx) => removeItem(idx, trips, setTrips)}
                                    />
                                    <SettingsCard
                                        title="📚 Classes"
                                        items={classes}
                                        newItem={newClass}
                                        setNewItem={setNewClass}
                                        onAdd={() => addItem(newClass, setNewClass, classes)}
                                        onRemove={(idx) => removeItem(idx, classes, setClasses)}
                                    />
                                    <SettingsCard
                                        title="👥 Sections"
                                        items={sections}
                                        newItem={newSection}
                                        setNewItem={setNewSection}
                                        onAdd={() => addItem(newSection, setNewSection, sections)}
                                        onRemove={(idx) => removeItem(idx, sections, setSections)}
                                    />
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
        }

        function SettingsCard({
            title,
            items,
            newItem,
            setNewItem,
            onAdd,
            onRemove,
        }) {
            return (
                <div className="border border-gray-300 rounded-2xl p-4 md:p-6 bg-white">
                    <h2 className="text-lg md:text-xl font-bold mb-4">{title}</h2>
                    <div className="flex gap-2 mb-4">
                        <input
                            value={newItem}
                            onChange={(e) => setNewItem(e.target.value)}
                            onKeyPress={(e) => e.key === "Enter" && onAdd()}
                            placeholder="Add new item"
                            className="flex-1 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm md:text-base"
                        />
                        <button
                            onClick={onAdd}
                            className="bg-blue-600 hover:bg-blue-700 text-white px-4 md:px-6 rounded-lg font-semibold transition touch-friendly-btn text-sm md:text-base"
                        >
                            Add
                        </button>
                    </div>
                    <div className="space-y-2">
                        {items.map((item, idx) => (
                            <div
                                key={idx}
                                className="flex justify-between items-center border border-gray-200 rounded-lg p-3 hover:bg-gray-50"
                            >
                                <span className="font-medium text-sm md:text-base">{item}</span>
                                <button
                                    onClick={() => onRemove(idx)}
                                    className="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs md:text-sm touch-friendly-btn"
                                >
                                    Remove
                                </button>
                            </div>
                        ))}
                        {items.length === 0 && (
                            <p className="text-gray-400 text-xs md:text-sm">No items added yet</p>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<StudentBusTripSystem />);
    </script>
</body>
</html>
